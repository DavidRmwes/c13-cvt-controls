      const fc = gc(f), tc = gc(t), dx = tc.x-fc.x, dy = tc.y-fc.y;
      let sx,sy,ex,ey;
      if (Math.abs(dx)>Math.abs(dy)) { if(dx>0){sx=f.x+f.w;sy=fc.y;ex=t.x;ey=tc.y}else{sx=f.x;sy=fc.y;ex=t.x+t.w;ey=tc.y} }
      else { if(dy>0){sx=fc.x;sy=f.y+f.h;ex=tc.x;ey=t.y}else{sx=fc.x;sy=f.y;ex=tc.x;ey=t.y+t.h} }
      if(Math.abs(sx-ex)<5||Math.abs(sy-ey)<5) return `M${sx},${sy} L${ex},${ey}`;
      if(Math.abs(dx)>Math.abs(dy)){const mx=(sx+ex)/2;return `M${sx},${sy} L${mx},${sy} L${mx},${ey} L${ex},${ey}`;}
      const my=(sy+ey)/2;return `M${sx},${sy} L${sx},${my} L${ex},${my} L${ex},${ey}`;
    }

    function App() {
      const cRef = useRef(null);
      const [tf, setTf] = useState({x:0,y:0,scale:1});
      const [drag, setDrag] = useState(false);
      const dsRef = useRef({x:0,y:0});
      const tfRef = useRef(tf);
      const [sel, setSel] = useState(null);
      const [hov, setHov] = useState(null);
      const nm = {}; nodes.forEach(n=>nm[n.id]=n);
      useEffect(()=>{tfRef.current=tf;},[tf]);

      const hw = useCallback((e)=>{
        e.preventDefault(); const d=e.deltaY>0?0.9:1.1, t=tfRef.current;
        const ns=Math.max(0.15,Math.min(4,t.scale*d)), r=cRef.current.getBoundingClientRect();
        const cx=e.clientX-r.left,cy=e.clientY-r.top;
        setTf({scale:ns,x:cx-(cx-t.x)*(ns/t.scale),y:cy-(cy-t.y)*(ns/t.scale)});
      },[]);
      useEffect(()=>{const el=cRef.current;if(el)el.addEventListener("wheel",hw,{passive:false});return()=>el&&el.removeEventListener("wheel",hw);},[hw]);

      const md=(e)=>{if(e.target.closest(".nd"))return;setDrag(true);dsRef.current={x:e.clientX-tf.x,y:e.clientY-tf.y};};
      const mm=(e)=>{if(drag)setTf(t=>({...t,x:e.clientX-dsRef.current.x,y:e.clientY-dsRef.current.y}));};
      const mu=()=>setDrag(false);

      const tRef=useRef({ld:null});
      const ts=(e)=>{if(e.touches.length===1){setDrag(true);dsRef.current={x:e.touches[0].clientX-tf.x,y:e.touches[0].clientY-tf.y};}if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;tRef.current.ld=Math.sqrt(dx*dx+dy*dy);}};
      const tmv=(e)=>{e.preventDefault();if(e.touches.length===1&&drag)setTf(t=>({...t,x:e.touches[0].clientX-dsRef.current.x,y:e.touches[0].clientY-dsRef.current.y}));if(e.touches.length===2&&tRef.current.ld){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,dist=Math.sqrt(dx*dx+dy*dy),dl=dist/tRef.current.ld,cx=(e.touches[0].clientX+e.touches[1].clientX)/2,cy=(e.touches[0].clientY+e.touches[1].clientY)/2,r=cRef.current.getBoundingClientRect(),px=cx-r.left,py=cy-r.top;setTf(t=>{const ns=Math.max(0.15,Math.min(4,t.scale*dl));return{scale:ns,x:px-(px-t.x)*(ns/t.scale),y:py-(py-t.y)*(ns/t.scale)};});tRef.current.ld=dist;}};
      const te=()=>{setDrag(false);tRef.current.ld=null;};

      const ftv=useCallback(()=>{
        if(!cRef.current)return;const r=cRef.current.getBoundingClientRect(),p=60;
        const x1=Math.min(...nodes.map(n=>n.x))-p,y1=Math.min(...nodes.map(n=>n.y))-p;
        const x2=Math.max(...nodes.map(n=>n.x+n.w))+p,y2=Math.max(...nodes.map(n=>n.y+n.h))+p;
        const cw=x2-x1,ch=y2-y1,s=Math.min(r.width/cw,r.height/ch,1.5);
        setTf({scale:s,x:(r.width-cw*s)/2-x1*s,y:(r.height-ch*s)/2-y1*s});
      },[]);
      useEffect(()=>{const t=setTimeout(ftv,150);window.addEventListener("resize",ftv);return()=>{clearTimeout(t);window.removeEventListener("resize",ftv);};},[ftv]);

      const rn=(n)=>{
        if(n.zone) return <g key={n.id}><rect x={n.x} y={n.y} width={n.w} height={n.h} rx={4} fill={BRAND.green} opacity={0.9}/><text x={n.x+n.w/2} y={n.y+n.h/2+1} textAnchor="middle" dominantBaseline="central" fill="#fff" fontSize="13" fontWeight="700" letterSpacing="2" style={{fontFamily:"'Oswald',sans-serif"}}>{n.label}</text></g>;
        const c=CATEGORIES[n.cat],ih=hov===n.id,is=sel===n.id,hd=!!details[n.id],cx=n.x+n.w/2,cy=n.y+n.h/2;
        if(n.diamond){const hw=n.w/2,hh=n.h/2;return<g key={n.id} className="nd" style={{cursor:hd?"pointer":"default"}} onClick={()=>hd&&setSel(n.id)} onMouseEnter={()=>setHov(n.id)} onMouseLeave={()=>setHov(null)}><polygon points={`${cx},${cy-hh} ${cx+hw},${cy} ${cx},${cy+hh} ${cx-hw},${cy}`} fill={c.color} stroke={is?BRAND.green:ih?BRAND.orange:"rgba(0,0,0,0.25)"} strokeWidth={is?3:ih?2.5:1.5} filter={ih?"url(#mg)":undefined}/>{n.label.split("\n").map((l,i,a)=><text key={i} x={cx} y={cy+(i-(a.length-1)/2)*14} textAnchor="middle" dominantBaseline="central" fill={c.text} fontSize="11" fontWeight="600" style={{fontFamily:"'Montserrat',sans-serif",pointerEvents:"none"}}>{l}</text>)}</g>;}
        return<g key={n.id} className="nd" style={{cursor:hd?"pointer":"default"}} onClick={()=>hd&&setSel(n.id)} onMouseEnter={()=>setHov(n.id)} onMouseLeave={()=>setHov(null)}><rect x={n.x} y={n.y} width={n.w} height={n.h} rx={5} fill={c.color} stroke={is?BRAND.green:ih?BRAND.orange:"rgba(0,0,0,0.15)"} strokeWidth={is?3:ih?2.5:1} filter={ih?"url(#mg)":undefined}/>{hd&&<rect x={n.x+n.w-19} y={n.y+3} width={15} height={15} rx={3} fill="rgba(255,255,255,0.2)"/>}{hd&&<text x={n.x+n.w-11.5} y={n.y+12.5} textAnchor="middle" dominantBaseline="central" fill="rgba(255,255,255,0.8)" fontSize="9" style={{fontFamily:"'Montserrat',sans-serif",pointerEvents:"none"}}>i</text>}{n.label.split("\n").map((l,i,a)=><text key={i} x={cx} y={cy+(i-(a.length-1)/2)*14} textAnchor="middle" dominantBaseline="central" fill={c.text} fontSize="11" fontWeight="600" style={{fontFamily:"'Montserrat',sans-serif",pointerEvents:"none"}}>{l}</text>)}</g>;
      };

      const re=(e,i)=>{
        const f=nm[e.from],t=nm[e.to];if(!f||!t)return null;const p=ep(f,t);
        const fl=e.label==="Fail"||e.label==="No Good"||e.label==="Re-shim";
        return<g key={`e${i}`}><path d={p} fill="none" stroke={e.dashed?"rgba(59,177,73,0.4)":"rgba(255,255,255,0.22)"} strokeWidth={e.dashed?1.5:2} strokeDasharray={e.dashed?"6,4":undefined} markerEnd={e.dashed?"url(#ag)":"url(#aw)"}/>{e.label&&(()=>{const fc=gc(f),tc=gc(t);return<text x={(fc.x+tc.x)/2} y={(fc.y+tc.y)/2-6} textAnchor="middle" fontSize="9" fontWeight="700" fill={fl?"#EF5350":BRAND.green} style={{fontFamily:"'Montserrat',sans-serif"}}>{e.label}</text>;})()}</g>;
      };

      const dd=sel?details[sel]:null;
      const zn=[{x:30,y:80,w:2250,h:440,c:"rgba(198,40,40,0.06)",b:"rgba(198,40,40,0.18)"},{x:30,y:545,w:1900,h:250,c:"rgba(59,177,73,0.04)",b:"rgba(59,177,73,0.12)"},{x:30,y:800,w:1550,h:240,c:"rgba(59,177,73,0.04)",b:"rgba(59,177,73,0.12)"}];
      const bs={background:"rgba(59,177,73,0.15)",border:"1px solid rgba(59,177,73,0.3)",color:BRAND.green,padding:"6px 14px",borderRadius:5,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Oswald',sans-serif",letterSpacing:1,transition:"all 0.15s ease"};

      return(
        <div style={{width:"100%",height:"100vh",background:BRAND.navy,position:"relative",overflow:"hidden",display:"flex",flexDirection:"column"}}>
          <div style={{background:`linear-gradient(135deg,${BRAND.navyDark} 0%,${BRAND.navy} 100%)`,borderBottom:`2px solid ${BRAND.green}`,padding:"10px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,flexWrap:"wrap",gap:12}}>
            <div style={{display:"flex",alignItems:"center",gap:20}}>
              <MWESLogo width={140}/>
              <div style={{height:36,width:1,background:"rgba(59,177,73,0.25)"}}/>
              <div>
                <div style={{color:"#fff",fontSize:18,fontWeight:700,letterSpacing:2,fontFamily:"'Oswald',sans-serif",textTransform:"uppercase"}}>C13 CVT TRANSMISSION</div>
                <div style={{color:"rgba(255,255,255,0.45)",fontSize:10.5,fontFamily:"'Montserrat',sans-serif",fontWeight:500,marginTop:1}}>Process Flow Diagram &bull; CNH America LLC &bull; Full System Overview</div>
              </div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <button onClick={ftv} style={bs}>FIT TO VIEW</button>
              <button onClick={()=>setTf(t=>({...t,scale:Math.min(4,t.scale*1.3)}))} style={{...bs,padding:"6px 10px",fontSize:14,letterSpacing:0}}>+</button>
              <button onClick={()=>setTf(t=>({...t,scale:Math.max(0.15,t.scale*0.77)}))} style={{...bs,padding:"6px 10px",fontSize:14,letterSpacing:0}}>−</button>
            </div>
          </div>

          <div style={{display:"flex",gap:16,padding:"7px 24px",flexWrap:"wrap",alignItems:"center",background:BRAND.navyDark,borderBottom:"1px solid rgba(59,177,73,0.1)",flexShrink:0}}>
            <span style={{color:BRAND.orange,fontSize:10,fontWeight:700,fontFamily:"'Oswald',sans-serif",letterSpacing:1.5,marginRight:4}}>LEGEND:</span>
            {Object.entries(CATEGORIES).filter(([k])=>k!=="housing").map(([k,c])=><div key={k} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:k==="decision"?9:12,height:k==="decision"?9:12,background:c.color,borderRadius:k==="decision"?0:2,transform:k==="decision"?"rotate(45deg)":undefined,flexShrink:0,border:"1px solid rgba(255,255,255,0.08)"}}/><span style={{color:"rgba(255,255,255,0.5)",fontSize:10,fontWeight:500,whiteSpace:"nowrap",fontFamily:"'Montserrat',sans-serif"}}>{c.label}</span></div>)}
            <div style={{display:"flex",alignItems:"center",gap:5}}><svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke={BRAND.green} strokeWidth="1.5" strokeDasharray="4,3" opacity="0.5"/></svg><span style={{color:"rgba(255,255,255,0.5)",fontSize:10,fontWeight:500,whiteSpace:"nowrap",fontFamily:"'Montserrat',sans-serif"}}>SUB-ASSY FEED</span></div>
          </div>

          <div ref={cRef} style={{flex:1,position:"relative",cursor:drag?"grabbing":"grab",touchAction:"none",background:`radial-gradient(ellipse at 25% 35%, rgba(59,177,73,0.03) 0%, transparent 55%), ${BRAND.navy}`}} onMouseDown={md} onMouseMove={mm} onMouseUp={mu} onMouseLeave={mu} onTouchStart={ts} onTouchMove={tmv} onTouchEnd={te}>
            <svg width="100%" height="100%" style={{position:"absolute",top:0,left:0}}>
              <defs>
                <marker id="aw" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="rgba(255,255,255,0.3)"/></marker>
                <marker id="ag" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5 Z" fill={BRAND.green} opacity="0.5"/></marker>
                <filter id="mg"><feDropShadow dx="0" dy="0" stdDeviation="5" floodColor={BRAND.orange} floodOpacity="0.4"/></filter>
              </defs>
              <g transform={`translate(${tf.x},${tf.y}) scale(${tf.scale})`}>
                {zn.map((z,i)=><rect key={`z${i}`} x={z.x} y={z.y} width={z.w} height={z.h} rx={10} fill={z.c} stroke={z.b} strokeWidth={1.5}/>)}
                {edges.map(re)}
                {nodes.map(rn)}
              </g>
            </svg>
          </div>

          {dd&&<div style={{position:"absolute",top:110,right:16,width:380,maxWidth:"calc(100vw - 32px)",background:BRAND.navyDark,border:"1px solid rgba(59,177,73,0.2)",borderTop:`3px solid ${BRAND.green}`,borderRadius:"0 0 8px 8px",boxShadow:"0 20px 60px rgba(0,0,0,0.5)",zIndex:100,maxHeight:"calc(100vh - 150px)",overflowY:"auto"}}>
            <div style={{padding:"14px 18px",borderBottom:"1px solid rgba(59,177,73,0.12)",display:"flex",justifyContent:"space-between",alignItems:"flex-start",position:"sticky",top:0,background:BRAND.navyDark}}>
              <div style={{paddingRight:12}}><div style={{color:BRAND.green,fontSize:14,fontWeight:700,fontFamily:"'Oswald',sans-serif",letterSpacing:1}}>{dd.title}</div><div style={{color:"rgba(255,255,255,0.4)",fontSize:11,marginTop:4,fontFamily:"'Montserrat',sans-serif"}}>{dd.part}</div></div>
              <button onClick={()=>setSel(null)} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(59,177,73,0.2)",color:BRAND.green,width:26,height:26,borderRadius:4,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontFamily:"'Montserrat',sans-serif"}}>&#x2715;</button>
            </div>
            <div style={{padding:"12px 18px 16px"}}>
              <div style={{color:BRAND.orange,fontSize:10,fontWeight:700,fontFamily:"'Oswald',sans-serif",letterSpacing:1.5,marginBottom:5}}>CONTROLS</div>
              <div style={{color:"rgba(255,255,255,0.65)",fontSize:12,marginBottom:14,lineHeight:1.5,fontFamily:"'Montserrat',sans-serif"}}>{dd.controls}</div>
              <div style={{color:BRAND.green,fontSize:10,fontWeight:700,fontFamily:"'Oswald',sans-serif",letterSpacing:1.5,marginBottom:5}}>OPERATIONS</div>
              {dd.operations.map((o,i)=><div key={i} style={{color:"rgba(255,255,255,0.6)",fontSize:11.5,marginBottom:4,paddingLeft:14,position:"relative",lineHeight:1.5,fontFamily:"'Montserrat',sans-serif"}}><span style={{position:"absolute",left:0,color:BRAND.green,fontWeight:700}}>&#x203A;</span>{o}</div>)}
              <div style={{color:BRAND.green,fontSize:10,fontWeight:700,fontFamily:"'Oswald',sans-serif",letterSpacing:1.5,marginTop:14,marginBottom:5}}>MWES EQUIPMENT</div>
              <div style={{color:"rgba(255,255,255,0.6)",fontSize:11.5,lineHeight:1.6,fontFamily:"'Montserrat',sans-serif"}}>{dd.equipment}</div>
              <div style={{color:BRAND.orange,fontSize:10,fontWeight:700,fontFamily:"'Oswald',sans-serif",letterSpacing:1.5,marginTop:14,marginBottom:5}}>CUSTOMER EQUIPMENT</div>
              <div style={{color:"rgba(255,255,255,0.6)",fontSize:11.5,lineHeight:1.6,fontFamily:"'Montserrat',sans-serif"}}>{dd.custEquip}</div>
            </div>
          </div>}

          <div style={{position:"absolute",bottom:0,left:0,right:0,height:30,background:BRAND.navyDark,borderTop:"1px solid rgba(59,177,73,0.1)",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 20px"}}>
            <div style={{color:"rgba(255,255,255,0.3)",fontSize:10,fontWeight:500,fontFamily:"'Montserrat',sans-serif"}}>{Math.round(tf.scale*100)}% &bull; Scroll to zoom &bull; Drag to pan &bull; Click nodes for details</div>
            <div style={{color:"rgba(255,255,255,0.2)",fontSize:9,fontWeight:500,fontFamily:"'Montserrat',sans-serif"}}>MWES &bull; Innovation through Automation &bull; mwes.com</div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>

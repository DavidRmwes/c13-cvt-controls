  <script>
    // Load Excel data, then boot React
    async function loadAndRender(){
      try{
        const resp=await fetch('flow-data.xlsx');
        if(!resp.ok)throw new Error('Could not load flow-data.xlsx ('+resp.status+')');
        const buf=await resp.arrayBuffer();
        const wb=XLSX.read(buf,{type:'array'});
        window._FLOW_DATA=parseWorkbook(wb);
        // Compile and execute the React app
        const compiled=Babel.transform(REACT_APP_SOURCE,{presets:['react','env']}).code;
        new Function(compiled)();
      }catch(e){
        document.getElementById('root').innerHTML='<div class="error-screen">⚠ '+e.message+'<br><br>Make sure <strong>flow-data.xlsx</strong> is in the same folder as flow.html</div>';
      }
    }

    function parseWorkbook(wb){
      const toObj=(name)=>{const ws=wb.Sheets[name];return ws?XLSX.utils.sheet_to_json(ws,{defval:''}):[]};
      const toArr=(name)=>{const ws=wb.Sheets[name];return ws?XLSX.utils.sheet_to_json(ws,{header:1,defval:''}):[]};

      // Categories
      const catRows=toObj('Categories');
      const categories={};
      catRows.forEach(r=>{categories[r.Key]={label:r.Label,color:r.Color,text:r['Text Color']}});

      // Nodes
      const nodeRows=toObj('Nodes');
      const nodes=nodeRows.map(r=>({
        id:String(r.ID),label:String(r.Label),cat:String(r.Category),
        x:Number(r.X),y:Number(r.Y),w:Number(r.Width),h:Number(r.Height),
        diamond:String(r.Diamond).toUpperCase()==='YES',
        zone:String(r.Zone).toUpperCase()==='YES'
      }));

      // Edges
      const edgeRows=toObj('Edges');
      const edges=edgeRows.map(r=>({
        from:String(r.From),to:String(r.To),
        label:r.Label?String(r.Label):'',
        dashed:String(r.Dashed).toUpperCase()==='YES'
      }));

      // Details
      const detRows=toObj('Details');
      const details={};
      detRows.forEach(r=>{
        const ops=String(r.Operations||'').split('\n').filter(s=>s.trim());
        details[String(r['Node ID'])]={
          title:r.Title,part:r['Part Number'],controls:r.Controls,
          operations:ops,equipment:r.Equipment,custEquip:r['Customer Equipment']
        };
      });

      // Zones
      const zoneArr=toArr('Zones');
      const zones=[];
      for(let i=1;i<zoneArr.length;i++){
        const r=zoneArr[i];
        if(r.length>=6)zones.push({x:Number(r[0]),y:Number(r[1]),w:Number(r[2]),h:Number(r[3]),b:String(r[4]),fo:Number(r[5])});
      }

      return{categories,nodes,edges,details,zones};
    }

            Object.entries(CATEGORIES).filter(([k])=>k!=="housing").map(([k,c])=>React.createElement("div",{key:k,style:{display:"flex",alignItems:"center",gap:8}},React.createElement("div",{style:{width:k==="decision"?10:14,height:k==="decision"?10:14,background:c.color,borderRadius:k==="decision"?0:3,transform:k==="decision"?"rotate(45deg)":undefined,flexShrink:0,border:"1px solid rgba(255,255,255,0.1)"}}),React.createElement("span",{style:{color:"rgba(255,255,255,0.6)",fontSize:10,fontWeight:500,fontFamily:"'Montserrat',sans-serif"}},c.label))),

            React.createElement("div",{style:{borderTop:"1px solid rgba(59,177,73,0.15)",paddingTop:6,marginTop:2,display:"flex",gap:4}},

              React.createElement("span",{style:{color:"rgba(255,255,255,0.25)",fontSize:9,display:"flex",alignItems:"center",marginLeft:4}},Math.round(tf.scale*100)+"%")

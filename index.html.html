*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;padding:12px;min-height:100vh}
.container{max-width:1200px;margin:0 auto}

.subtitle{font-size:11px;color:#94a3b8;margin:2px 0 8px}

.stat-val{font-size:18px;font-weight:700}
.stat-lbl{font-size:9px;font-weight:600;color:#cbd5e1}
.stat-sub{font-size:8px;color:#64748b}
.filter-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}

.filter-btn.active{border-color:#e2e8f0;background:#334155;color:#f8fafc}
.filter-btn:hover{border-color:#64748b}
.map-container{background:#1e293b;border-radius:6px;border:1px solid #334155;padding:8px;margin-bottom:10px}
.map-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:10px;color:#64748b}
.cardinal{color:#f8fafc;font-size:9px}
svg text{user-select:none}
.station-rect{cursor:pointer;transition:opacity 0.15s}
.station-rect:hover{opacity:1!important}
.detail-panel{background:#1e293b;border-radius:6px;padding:14px;margin-bottom:10px;display:none}
.detail-panel.visible{display:block}
.detail-header{display:flex;justify-content:space-between;align-items:flex-start}
.detail-title{font-size:16px;font-weight:700}
.detail-zone{font-size:11px;color:#64748b;margin:2px 0 10px}
.close-btn{background:none;border:none;color:#94a3b8;cursor:pointer;font-size:18px;padding:0 4px}
.close-btn:hover{color:#f8fafc}
.badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.badge{font-size:10px;padding:2px 8px;border-radius:4px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:768px){.two-col{grid-template-columns:1fr}}
.section-title{font-size:12px;font-weight:700;color:#94a3b8;margin:0 0 6px;border-bottom:1px solid #334155;padding-bottom:4px}
.section-title.red{color:#ef4444;border-color:#7f1d1d}
.hw-block{margin-bottom:8px;padding:6px;background:#0f172a;border-radius:4px}
.hw-label{font-size:10px;font-weight:600}
.hw-val{font-size:11px;color:#e2e8f0;margin-top:2px}
.hw-sub{font-size:10px;color:#94a3b8}
.hw-warn{font-size:10px;color:#fbbf24}
.eq-item{font-size:11px;color:#cbd5e1;padding:2px 0;border-bottom:1px solid #1e293b}
.concern-item{font-size:11px;padding:4px 6px;margin-bottom:3px;border-radius:3px;border-left:3px solid #334155;background:#0f172a;color:#cbd5e1}
.concern-item.critical{border-left-color:#f59e0b;background:#422006;color:#fbbf24}
.project-concerns{background:#1e293b;border-radius:6px;border:2px solid #dc2626;padding:14px}
.project-concerns h3{font-size:14px;font-weight:700;color:#ef4444;margin:0 0 8px}
.pc-item{padding:8px 10px;margin-bottom:6px;border-radius:4px}
.pc-item.high{background:#450a0a;border-left:4px solid #ef4444}
.pc-item.medium{background:#422006;border-left:4px solid #f59e0b}
.pc-item.low{background:#0f172a;border-left:4px solid #64748b}
.pc-header{display:flex;justify-content:space-between;align-items:center}
.pc-title{font-size:12px;font-weight:700}
.pc-title.high{color:#fca5a5}.pc-title.medium{color:#fcd34d}.pc-title.low{color:#94a3b8}

let currentFilter="all",selectedId=null;

function init(){
  renderStats();renderFilters();renderMap();renderProjectConcerns();
}

function renderStats(){
  const g=document.getElementById("statsGrid");
  g.innerHTML=STATS.map(s=>`<div class="stat-card" style="border-left:3px solid ${s.c}"><div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-lbl">${s.l}</div><div class="stat-sub">${s.s}</div></div>`).join("");
}

function renderFilters(){
  const b=document.getElementById("filterBar");
  b.innerHTML=FILTERS.map(f=>{
    let cnt=f.key==="all"?LOCS.length:f.key==="noPlc"?LOCS.filter(l=>!l.hasPlc).length:f.key==="anomaly"?LOCS.filter(l=>l.cat==="anomaly"||l.concerns.some(c=>c.includes("CRITICAL")||c.includes("RED FLAG")||c.includes("CONFLICT"))).length:LOCS.filter(l=>l[f.key]).length;
    return `<button class="filter-btn ${currentFilter===f.key?"active":""}" onclick="setFilter('${f.key}')">${f.label} (${cnt})</button>`;
  }).join("");
}

function setFilter(f){currentFilter=f;selectedId=null;renderFilters();renderMap();document.getElementById("detailPanel").classList.remove("visible")}

function getFiltered(){
  return LOCS.filter(l=>{
    if(currentFilter==="all")return true;
    if(currentFilter==="hasPlc")return l.hasPlc;
    if(currentFilter==="noPlc")return!l.hasPlc;
    if(currentFilter==="anomaly")return l.cat==="anomaly"||l.concerns.some(c=>c.includes("CRITICAL")||c.includes("RED FLAG")||c.includes("CONFLICT"));
    return l[currentFilter];
  });
}

  let h=`
    <text x="35" y="1.5" fill="#475569" font-size="1.8" text-anchor="middle" font-weight="600">SOUTH — Sub-Assembly Stations</text>
    <text x="22" y="26" fill="#475569" font-size="1.8" text-anchor="middle" font-weight="600">MAINLINE (EAST → WEST)</text>
    <text x="25" y="40" fill="#475569" font-size="1.8" text-anchor="middle" font-weight="600">NORTH — Sub-Assembly & Rear Housing</text>
    <text x="60" y="26" fill="#475569" font-size="1.5" text-anchor="middle" font-weight="600">WEST — Front Hsg</text>
    <text x="-1" y="28" fill="#ef4444" font-size="2" font-weight="700">E</text>
    <text x="69" y="28" fill="#ef4444" font-size="2" font-weight="700">W</text>
    <text x="35" y="-0.5" fill="#ef4444" font-size="2" font-weight="700" text-anchor="middle">S</text>
    <text x="35" y="56" fill="#ef4444" font-size="2" font-weight="700" text-anchor="middle">N</text>
    <line x1="6" y1="32" x2="53" y2="32" stroke="#fbbf24" stroke-width="0.4" stroke-dasharray="1.5,1"/>
    <text x="30" y="31.2" fill="#fbbf24" font-size="1.2" text-anchor="middle">Cart Path (~200 ft)</text>`;
  LOCS.forEach(l=>{
    const vis=ids.has(l.id);const isSel=selectedId===l.id;
    const fill=isSel?l.color:vis?l.color+"88":l.color+"22";
    const stroke=isSel?"#f8fafc":l.cat==="anomaly"?"#ef4444":l.color;
    const sw=isSel?0.6:l.cat==="anomaly"?0.4:0.3;
    const sd=l.cat==="anomaly"?"1,0.5":"none";
    const op=vis?1:0.2;
    h+=`<g class="station-rect" onclick="selectStation('${l.id}')" style="opacity:${op}">`;
    h+=`<rect x="${l.x}" y="${l.y}" width="${l.w}" height="${l.h}" rx="0.5" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" stroke-dasharray="${sd}"/>`;
    h+=`<text x="${l.x+l.w/2}" y="${l.y+l.h/2-0.5}" text-anchor="middle" dominant-baseline="central" fill="#f1f5f9" font-size="${l.w>8?1.3:1.1}" font-weight="600">${l.name.split("—")[0].trim().substring(0,18)}</text>`;
    const badges=[];
    if(l.hasPlc)badges.push({lb:"PLC",c:"#3b82f6"});if(l.hasPromess)badges.push({lb:"P",c:"#a855f7"});if(l.hasCognex)badges.push({lb:"V",c:"#22d3ee"});if(l.hasPointIO)badges.push({lb:"IO",c:"#14b8a6"});
    badges.forEach((b,bi)=>{
      h+=`<rect x="${l.x+0.5+bi*3}" y="${l.y+l.h-2.2}" width="2.5" height="1.6" rx="0.3" fill="${b.c}" opacity="0.85"/>`;
      h+=`<text x="${l.x+1.75+bi*3}" y="${l.y+l.h-1.3}" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="0.85" font-weight="700">${b.lb}</text>`;
    });
    if(l.cat==="anomaly")h+=`<text x="${l.x+l.w-1}" y="${l.y+1.5}" fill="#ef4444" font-size="2" font-weight="700">!</text>`;
    h+=`</g>`;
  });
  svg.innerHTML=h;
}

function selectStation(id){
  selectedId=selectedId===id?null:id;renderMap();
  const p=document.getElementById("detailPanel");
  if(!selectedId){p.classList.remove("visible");return}
  const l=LOCS.find(x=>x.id===id);if(!l){p.classList.remove("visible");return}
  let html=`<div class="detail-header"><div><div class="detail-title" style="color:${l.color}">${l.name}</div><div class="detail-zone">${l.zone}</div></div><button class="close-btn" onclick="selectStation('${id}')">✕</button></div>`;
  html+=`<div class="badge-row">`;
  if(l.hasPlc)html+=`<span class="badge" style="background:#1e3a8a;color:#93c5fd">PLC: ${l.plcModel}</span>`;
  if(l.hasHmi)html+=`<span class="badge" style="background:#1e3a5f;color:#93c5fd">HMI: ${l.hmiModel}</span>`;
  if(l.hasPromess)html+=`<span class="badge" style="background:#3b0764;color:#c4b5fd">Promess: ${l.promessModel}</span>`;
  if(l.hasCognex)html+=`<span class="badge" style="background:#083344;color:#67e8f9">Cognex: ${l.cognexModel}</span>`;
  if(l.hasPointIO)html+=`<span class="badge" style="background:#042f2e;color:#5eead4">Point I/O: ${l.pointIO}</span>`;
  if(!l.hasPlc)html+=`<span class="badge" style="background:#1c1917;color:#a8a29e">NO MWES PLC</span>`;
  html+=`</div><div class="two-col"><div>`;
  html+=`<h3 class="section-title">HARDWARE & EQUIPMENT</h3>`;
  if(l.hasPromess)html+=`<div class="hw-block"><div class="hw-label" style="color:#a855f7">PROMESS SERVO PRESS</div><div class="hw-val">${l.promessModel}</div><div class="hw-sub">Controller: ${l.promessCtrl}</div><div class="hw-sub">Frame: ${l.promessFrame}</div><div class="hw-sub">Max req: ${l.promessMax}</div></div>`;
  if(l.hasCognex)html+=`<div class="hw-block"><div class="hw-label" style="color:#22d3ee">COGNEX VISION</div><div class="hw-val">${l.cognexModel}</div><div class="hw-warn">Programming: ${l.cognexProg}</div></div>`;
  html+=`<div class="hw-block"><div class="hw-label" style="color:#f97316">TORQUE TOOLS</div><div class="hw-val">Count: ${l.torqueTools} | Range: ${l.torqueRange}</div><div class="hw-sub">Owner: ${l.torqueOwner}</div></div>`;
  html+=`<div class="hw-block"><div class="hw-label" style="color:#16a34a">PIVOTWARE</div><div class="hw-val">${l.pivotware}</div>`;
  if(l.pwInterface&&l.pwInterface!=="N/A")html+=`<div class="hw-warn">Interface: ${l.pwInterface}</div>`;
  html+=`</div>`;
  if(l.network)html+=`<div class="hw-block"><div class="hw-label" style="color:#94a3b8">NETWORK</div><div class="hw-val">${l.network}</div>${l.drives?`<div class="hw-sub">Drives: ${l.drives}</div>`:""}</div>`;
  html+=`</div><div>`;
  if(l.equipment){
    html+=`<h3 class="section-title">EQUIPMENT LIST</h3>`;
    l.equipment.forEach(e=>{html+=`<div class="eq-item">• ${e}</div>`});
  }
  if(l.concerns){
    html+=`<h3 class="section-title red" style="margin-top:10px">CONCERNS & OPEN ISSUES (${l.concerns.length})</h3>`;
    l.concerns.forEach(c=>{
      const crit=c.includes("CRITICAL")||c.includes("RED FLAG")||c.includes("CONFLICT")||c.includes("RECOMMEND");
      html+=`<div class="concern-item ${crit?"critical":""}">${c}</div>`;
    });
  }
  html+=`</div></div>`;
  p.innerHTML=html;p.style.borderColor=l.color;p.classList.add("visible");
}

function renderProjectConcerns(){
  const d=document.getElementById("projectConcerns");
  let h=`<h3>PROJECT-WIDE CONTROLS CONCERNS</h3>`;
  PROJ_CONCERNS.forEach(c=>{
    h+=`<div class="pc-item ${c.s}"><div class="pc-header"><span class="pc-title ${c.s}">${c.t}</span><span class="pc-sev ${c.s}">${c.s.toUpperCase()}</span></div><p class="pc-desc">${c.d}</p></div>`;
  });
  d.innerHTML=h;
}

document.addEventListener("DOMContentLoaded",init);
</script>
</body>
</html>

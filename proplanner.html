<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C13 CVT – ProPlanner Integration | MWES</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--g:#3BB149;--n:#283549;--o:#D07A08;--gr:#E9E9E9;--nl:#344863;--nd:#1c2636;--ndr:#151d2b;--gd:#2d8a38;--gb:#4cd95a;--ob:#f0a030;--tp:#E9E9E9;--ts:#a0aec0;--tm:#6b7a8d;--bd:#3d4f65;--cb:#1e3044}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',system-ui,sans-serif;background:var(--n);color:var(--tp);min-height:100vh;padding:16px 20px 40px}
h1,h2,h3{font-family:'Oswald',system-ui,sans-serif;text-transform:uppercase;letter-spacing:.5px}
.container{max-width:1500px;margin:0 auto}
.card{background:var(--cb);border-radius:6px;padding:14px;margin-bottom:10px;border:1px solid var(--bd)}
.card.w{border-color:var(--o);border-left:4px solid var(--o)}
.card.d{border-color:#c0392b;border-left:4px solid #c0392b}
.card.i{border-color:var(--g);border-left:4px solid var(--g)}
.card.s{border-color:var(--g);background:#1a3328}
.tg{display:inline-block;font-family:Oswald;font-size:9px;padding:2px 7px;border-radius:3px;margin-right:3px;letter-spacing:.5px;text-transform:uppercase}
.tg-g{background:var(--gd);color:var(--gb)}.tg-o{background:#5c3a10;color:var(--ob)}.tg-r{background:#5c1a1a;color:#f87171}
.tg-b{background:#1e3a5f;color:#7eb8f0}.tg-p{background:#3b1764;color:#c4b5fd}.tg-gr{background:var(--nl);color:var(--ts);border:1px solid var(--bd)}
table{width:100%;border-collapse:collapse;margin:8px 0;font-size:11px}
th{background:var(--nd);color:var(--g);text-align:left;padding:5px 8px;border:1px solid var(--bd);font-family:Oswald;font-weight:500;font-size:10px;white-space:nowrap;text-transform:uppercase;letter-spacing:.5px}
td{padding:5px 8px;border:1px solid var(--bd);color:var(--tp);vertical-align:top}
tr:hover td{background:var(--nl)}
.mo{font-family:'Courier New',monospace;font-size:11px;color:var(--gb)}
.mb{background:var(--ndr);border-radius:6px;padding:10px;margin:8px 0;font-family:'Courier New',monospace;font-size:10px;color:var(--gb);line-height:1.6;overflow-x:auto;white-space:pre;border:1px solid var(--bd)}
.rc{background:#0c0a09;border:1px solid var(--o);border-radius:6px;padding:10px;margin:8px 0;font-family:'Courier New',monospace;font-size:10px;color:var(--ob);line-height:1.6;overflow-x:auto;white-space:pre}
.rv{padding:7px 10px;margin-bottom:5px;border-radius:4px;border-left:4px solid var(--g);background:#14332a;font-size:11px;color:var(--gb);line-height:1.5}
.nt2{padding:7px 10px;margin-bottom:5px;border-radius:4px;border-left:4px solid var(--g);background:#1a3328;font-size:11px;color:var(--gb);line-height:1.5}
.oq{padding:7px 10px;margin-bottom:5px;border-radius:4px;border-left:4px solid var(--o);background:#3d2a10;font-size:11px;color:var(--ob);line-height:1.5}
.sd{height:3px;background:linear-gradient(90deg,var(--g),var(--o),var(--g));border-radius:2px;margin:16px 0;opacity:.4}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:900px){.g2{grid-template-columns:1fr}}
.scard{background:var(--ndr);border-radius:6px;padding:10px;margin-bottom:8px;cursor:pointer;border:1px solid var(--bd);transition:border-color .15s}
.scard:hover{border-color:var(--g)}.scard.exp{border-color:var(--g);border-left:4px solid var(--g)}
.sdet{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)}.scard.exp .sdet{display:block}
.shdr{display:flex;justify-content:space-between;align-items:center}
.ei{color:var(--tm);font-size:12px;transition:transform .2s}.scard.exp .ei{transform:rotate(180deg);color:var(--g)}
.loading{text-align:center;padding:60px;color:var(--g);font-family:Oswald;font-size:16px;letter-spacing:2px}
.err{text-align:center;padding:40px;color:#f87171;font-size:13px}
</style>
</head>
<body>
<div class="container">
<div id="pageTitle"></div>
<div id="content"><div class="loading">LOADING DATA FROM EXCEL...</div></div>
</div>

<script>
// Complexity tag mapping
function cxTag(v){
  if(!v||v==='N/A')return'<span class="tg tg-gr">N/A</span>';
  if(v==='LOW')return'<span class="tg tg-g">LOW</span>';
  if(v==='HIGH')return'<span class="tg tg-o">HIGH</span>';
  if(v==='VERY HIGH')return'<span class="tg tg-r">VERY HIGH</span>';
  return'<span class="tg tg-gr">'+v+'</span>';
}
function statusTag(v){
  if(v==='OPEN')return'<span class="tg tg-r">OPEN</span>';
  if(v==='IN PROGRESS')return'<span class="tg tg-o">IN PROGRESS</span>';
  if(v==='RESOLVED')return'<span class="tg tg-g">RESOLVED</span>';
  return'<span class="tg tg-gr">'+v+'</span>';
}
function snColor(sn){
  if(sn=='1')return'#f87171';if(sn=='2'||sn=='3')return'var(--gb)';return'var(--ob)';
}
function esc(s){return s?String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

// Read sheet as array of objects (first row = headers)
function sheetToObj(wb,name){
  const ws=wb.Sheets[name];if(!ws)return[];
  return XLSX.utils.sheet_to_json(ws,{defval:''});
}
// Read sheet as 2D array
function sheetToArr(wb,name){
  const ws=wb.Sheets[name];if(!ws)return[];
  return XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
}

async function load(){
  try{
    const resp=await fetch('proplanner-data.xlsx');
    if(!resp.ok)throw new Error('Could not load proplanner-data.xlsx ('+resp.status+')');
    const buf=await resp.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});
    render(wb);
  }catch(e){
    document.getElementById('content').innerHTML='<div class="err">⚠ '+esc(e.message)+'<br><br>Make sure <strong>proplanner-data.xlsx</strong> is in the same folder as this HTML file.</div>';
  }
}

function render(wb){
  let h='';

  // --- Config ---
  const cfg=sheetToObj(wb,'Config');
  const cfgMap={};cfg.forEach(r=>{if(!cfgMap[r.Section])cfgMap[r.Section]={};cfgMap[r.Section][r.Key]=r.Value});
  const pg=cfgMap['Page']||{};
  document.getElementById('pageTitle').innerHTML=
    '<h2 style="color:var(--g);font-size:18px;border:none;padding:0;margin-bottom:4px">'+esc(pg.title||'ProPlanner Integration')+'</h2>'+
    '<p style="font-size:11px;color:var(--ts);margin-bottom:10px">'+esc(pg.subtitle||'')+'</p>';

  // --- Resolved ---
  const res=sheetToObj(wb,'Resolved');
  if(res.length){
    h+='<div class="card s"><h3 style="color:var(--gb);font-size:13px">Resolved Questions</h3>';
    res.forEach(r=>{h+='<div class="rv"><strong>'+esc(r['Q#'])+':</strong> '+esc(r.Answer)+'</div>'});
    h+='</div><div class="sd"></div>';
  }

  // --- Architecture ---
  const plcCfg=(cfgMap['PLC Server']||{});const ppCfg=(cfgMap['ProPlanner Client']||{});
  h+='<div class="card"><h2 style="color:var(--g);font-size:15px">Socket Architecture</h2><div class="g2"><div>';
  h+='<h3 style="color:var(--g);font-size:12px;margin-bottom:4px">MWES PLC (TCP Server)</h3><table><tr><th>Parameter</th><th>Value</th></tr>';
  Object.entries(plcCfg).forEach(([k,v])=>{h+='<tr><td>'+esc(k)+'</td><td'+(k==='Role'?' style="color:var(--g);font-weight:700"':'')+'>'+esc(v)+'</td></tr>'});
  h+='</table></div><div>';
  h+='<h3 style="color:var(--ob);font-size:12px;margin-bottom:4px">ProPlanner (TCP Client)</h3><table><tr><th>Parameter</th><th>Value</th></tr>';
  Object.entries(ppCfg).forEach(([k,v])=>{h+='<tr><td>'+esc(k)+'</td><td'+(k==='Role'?' style="color:var(--ob);font-weight:700"':'')+'>'+esc(v)+'</td></tr>'});
  h+='</table></div></div>';

  // --- Connection Map ---
  const conn=sheetToObj(wb,'Connections');
  if(conn.length){
    h+='<h3 style="color:var(--ts);font-size:12px;margin-top:12px">Connection Map</h3>';
    h+='<table><tr><th>PLC</th><th>IP</th><th>Port</th><th>ProPlanner</th><th>Functions</th><th>Complexity</th></tr>';
    conn.forEach(r=>{
      const dim=r.ProPlanner==='NONE';
      h+='<tr'+(dim?' style="background:var(--nd)"':'')+'>';
      h+='<td style="'+(dim?'color:var(--tm)':'color:var(--g);font-weight:600')+'">'+esc(r['PLC Name'])+'</td>';
      h+='<td class="mo"'+(dim?' style="color:var(--tm)"':'')+'>'+esc(r['PLC IP'])+'</td>';
      h+='<td'+(dim?' style="color:var(--tm)"':' class="mo"')+'>'+esc(r.Port)+'</td>';
      h+='<td'+(dim?' style="color:var(--tm)"':'')+'>'+esc(r.ProPlanner)+'</td>';
      h+='<td'+(dim?' style="color:var(--tm)"':'')+'>'+esc(r.Functions)+'</td>';
      h+='<td>'+cxTag(r.Complexity)+'</td></tr>';
    });
    h+='</table>';
  }
  h+='</div><div class="sd"></div>';

  // --- AOI State Machine ---
  const aoi=sheetToObj(wb,'AOI States');
  if(aoi.length){
    h+='<div class="card"><h2 style="color:var(--g);font-size:15px">SKT_AOI_TCP_SERVER — State Machine</h2>';
    h+='<table><tr><th>State</th><th>Action</th><th>Next</th><th>Notes</th></tr>';
    aoi.forEach(r=>{
      const isMain=String(r.State)==='50'||String(r.State)==='60';
      const mc=String(r.State)==='50'?'var(--gb)':String(r.State)==='60'?'var(--ob)':'';
      h+='<tr><td class="mo"'+(mc?' style="color:'+mc+';font-weight:700"':'')+'>'+esc(r.State)+'</td>';
      h+='<td'+(isMain?' style="color:'+mc+';font-weight:700"':'')+'>'+(isMain?'<strong>':'')+esc(r.Action)+(isMain?'</strong>':'')+'</td>';
      h+='<td class="mo">'+esc(r['Next State'])+'</td>';
      h+='<td'+(String(r.Notes).includes('timeout')?' style="color:var(--ob)"':'')+'>'+esc(r.Notes)+'</td></tr>';
    });
    h+='</table>';
  }

  // --- Code: PLC Tags ---
  const code=sheetToObj(wb,'Code Blocks');
  const codeMap={};code.forEach(r=>{codeMap[r['Block Name']]=r.Content});
  if(codeMap['PLC Tags']){
    h+='<h3 style="color:var(--ts);font-size:12px;margin-top:10px">Required PLC Tags</h3>';
    h+='<div class="mb">'+esc(codeMap['PLC Tags'])+'</div>';
  }
  h+='</div><div class="sd"></div>';

  // --- Reference Code ---
  if(codeMap['Reference Inbound']||codeMap['Reference Outbound']){
    h+='<div class="card i"><h2 style="color:var(--g);font-size:15px">Reference Code Analysis</h2>';
    if(codeMap['Reference Inbound']){h+='<h3 style="color:var(--ob);font-size:12px">Inbound Parsing</h3><div class="rc">'+esc(codeMap['Reference Inbound'])+'</div>';}
    if(codeMap['Reference Outbound']){h+='<h3 style="color:var(--ob);font-size:12px;margin-top:10px">Outbound Responses</h3><div class="rc">'+esc(codeMap['Reference Outbound'])+'</div>';}
    h+='<div class="nt2"><strong>Key Takeaway:</strong> ASCII command in → MID() parse → execute → CONCAT() response → socket write. No binary, no CRC.</div>';
    h+='</div><div class="sd"></div>';
  }

  // --- Protocol ---
  if(codeMap['Protocol Inbound']||codeMap['Protocol Outbound']){
    h+='<div class="card"><h2 style="color:var(--g);font-size:15px">ASCII String Protocol</h2>';
    if(codeMap['Protocol Inbound']){h+='<h3 style="color:var(--ob);font-size:12px">Inbound (ProPlanner → PLC)</h3><div class="mb">'+esc(codeMap['Protocol Inbound'])+'</div>';}
    if(codeMap['Protocol Outbound']){h+='<h3 style="color:var(--ob);font-size:12px;margin-top:8px">Outbound (PLC → ProPlanner)</h3><div class="mb">'+esc(codeMap['Protocol Outbound'])+'</div>';}
    h+='</div><div class="sd"></div>';
  }

  // --- StepNum Commands ---
  const steps=sheetToObj(wb,'StepNum Commands');
  if(steps.length){
    h+='<div class="card w"><h2 style="color:var(--g);font-size:15px">StepNum Command Definitions</h2>';
    h+='<table><tr><th>Step</th><th>Command</th><th>Src</th><th>Payload</th><th>Response</th><th>Stations</th></tr>';
    steps.forEach(r=>{
      const isExt=r.Source==='C13';
      h+='<tr'+(isExt?' style="background:#3d2a10"':'')+'>';
      h+='<td style="color:'+snColor(r.StepNum)+';font-weight:700;font-size:14px;text-align:center;font-family:Oswald">'+esc(r.StepNum)+'</td>';
      h+='<td style="font-family:Oswald;font-size:11px;letter-spacing:.5px">'+esc(r.Command)+'</td>';
      h+='<td><span class="tg '+(isExt?'tg-o':'tg-g')+'">'+esc(r.Source)+'</span></td>';
      h+='<td class="mo">'+esc(r.Payload)+'</td>';
      h+='<td class="mo" style="font-size:10px">'+esc(r.Response)+'</td>';
      h+='<td>'+esc(r.Stations)+'</td></tr>';
    });
    h+='</table>';
    h+='<div class="oq"><strong>OPEN:</strong> StepNums 5–9 are MWES proposals. CNH must confirm ProPlanner can support extended command types.</div>';
    h+='</div><div class="sd"></div>';
  }

  // --- Response Tags ---
  if(codeMap['Response Tags']){
    h+='<div class="card"><h2 style="color:var(--g);font-size:15px">PLC Response Formats</h2>';
    h+='<div class="mb">'+esc(codeMap['Response Tags'])+'</div>';
    h+='<div class="nt2"><strong>Distance Encoding:</strong> ReachedDiatance * 10000 → DTOS → string. Under 6 digits gets leading zero.</div>';
    h+='</div><div class="sd"></div>';
  }

  // --- Recipe UDT ---
  if(codeMap['Recipe UDT']){
    h+='<div class="card i"><h2 style="color:var(--g);font-size:15px">OPTIX Recipe Manager</h2>';
    h+='<div class="mb">'+esc(codeMap['Recipe UDT'])+'</div>';
    h+='</div><div class="sd"></div>';
  }

  // --- Sequence Diagrams ---
  const seqs=code.filter(r=>String(r['Block Name']).startsWith('Sequence_'));
  if(seqs.length){
    h+='<div class="card"><h2 style="color:var(--g);font-size:15px">Sequence Diagrams</h2>';
    seqs.forEach(r=>{
      const label=String(r['Block Name']).replace('Sequence_','').replace(/_/g,' ');
      h+='<h3 style="color:var(--ts);font-size:12px;margin-top:10px;margin-bottom:4px">'+esc(label)+'</h3>';
      h+='<div class="mb">'+esc(r.Content)+'</div>';
    });
    h+='<div class="nt2"><strong>Auto-Recovery:</strong> If Stop_on_Error=FALSE and Enable_Socket=TRUE, AOI restarts automatically. HMI shows status via OPEN flag.</div>';
    h+='</div><div class="sd"></div>';
  }

  // --- Per-Station Mapping ---
  const stns=sheetToObj(wb,'Stations');
  if(stns.length){
    h+='<div class="card"><h2 style="color:var(--g);font-size:15px">Per-Station Message Mapping</h2>';
    h+='<p style="font-size:11px;color:var(--ts);margin-bottom:8px">Click to expand.</p>';
    // Group by station name
    const groups={};const order=[];
    stns.forEach(r=>{
      const nm=r['Station Name'];
      if(!groups[nm]){groups[nm]={color:r.Color,plc:r.PLC,tools:r.Tools,note:r.Note,steps:[]};order.push(nm)}
      groups[nm].steps.push(r);
      if(r.Note&&!groups[nm].note)groups[nm].note=r.Note;
    });
    order.forEach((nm,idx)=>{
      const g=groups[nm];const sid='stn'+idx;
      h+='<div class="scard" id="'+sid+'" onclick="document.getElementById(\''+sid+'\').classList.toggle(\'exp\')">';
      h+='<div class="shdr"><div>';
      h+='<span style="color:'+g.color+';font-weight:700;font-size:13px;font-family:Oswald;text-transform:uppercase;letter-spacing:.5px">'+esc(nm)+'</span> ';
      h+='<span class="tg tg-b">'+esc(g.plc)+'</span>';
      h+='<span class="tg tg-p">'+esc(g.tools)+' TOOLS</span>';
      h+='<span class="tg tg-g">'+g.steps.length+' CMDS</span>';
      h+='</div><span class="ei">▼</span></div>';
      h+='<div class="sdet"><table><tr><th>Step</th><th>Command</th><th>Description</th><th>Response</th></tr>';
      g.steps.forEach(st=>{
        const isExt=st.Extended==='EXT';
        h+='<tr'+(isExt?' style="background:#3d2a10"':'')+'>';
        h+='<td style="color:'+snColor(st.StepNum)+';font-weight:700;font-size:14px;text-align:center;font-family:Oswald">'+esc(st.StepNum)+'</td>';
        h+='<td style="font-family:Oswald;font-size:11px;letter-spacing:.5px">'+esc(st.Command)+'</td>';
        h+='<td>'+esc(st.Description)+'</td>';
        h+='<td class="mo" style="font-size:10px">'+esc(st.Response)+(isExt?' <span class="tg tg-o">C13</span>':'')+'</td></tr>';
      });
      h+='</table>';
      if(g.note)h+='<div class="nt2" style="margin-top:6px;font-size:11px">'+esc(g.note)+'</div>';
      h+='</div></div>';
    });
    h+='</div><div class="sd"></div>';
  }

  // --- No-PLC ---
  const noplc=sheetToObj(wb,'No-PLC Stations');
  if(noplc.length){
    h+='<div class="card d"><h2 style="color:var(--g);font-size:15px">No-PLC Stations — ProPlanner Standalone</h2>';
    h+='<table><tr><th>Station</th><th>Tools</th><th>Max Torque</th><th>ProPlanner Role</th><th>MWES Socket</th></tr>';
    noplc.forEach(r=>{
      h+='<tr><td>'+esc(r.Station)+'</td>';
      h+='<td'+(String(r.Tools)==='12'?' style="color:var(--ob);font-weight:700"':'')+'>'+esc(r.Tools)+'</td>';
      h+='<td>'+esc(r['Max Torque'])+'</td>';
      h+='<td>'+esc(r['ProPlanner Role'])+'</td>';
      h+='<td style="color:#f87171">'+esc(r['MWES Socket'])+'</td></tr>';
    });
    h+='</table>';
    h+='<div class="nt2" style="margin-top:8px">27 torque tools across 6 stations with zero MWES interface. ProPlanner handles all sequencing independently.</div>';
    h+='</div><div class="sd"></div>';
  }

  // --- Open Questions ---
  const oq=sheetToObj(wb,'Open Questions');
  if(oq.length){
    h+='<div class="card w"><h2 style="color:var(--g);font-size:15px">Remaining Open Questions</h2>';
    h+='<table><tr><th>#</th><th>Status</th><th>Question</th><th>Impact</th></tr>';
    oq.forEach(r=>{
      h+='<tr><td>'+esc(r['Q#'])+'</td><td>'+statusTag(r.Status)+'</td><td>'+esc(r.Question)+'</td><td>'+esc(r.Impact)+'</td></tr>';
    });
    h+='</table></div>';
  }

  document.getElementById('content').innerHTML=h;
}

document.addEventListener('DOMContentLoaded',load);
</script>
</body>
</html>
